<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REGSTRATSIYA</title>
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="regstrick" data-aos="zoom-out">
    <div class="signed-div">
      <button class="sign-in" data-aos="zoom-in-right"> <a class="div-a" href="../index.html">Sign Up</a></button>
      <button class="sign-up" data-aos="zoom-in-left"><a class="div-aa" href="#">Sign In</a></button>
    </div>
    <div class="sign-div" data-aos="zoom-in">
      <h1 class="div-h1">Sign Up for free</h1>
      <div class="nebula-input">
        <input required="" type="text" name="text" autocomplete="off" class="input" />
        <label class="user-label">LOGIN</label>
        <div class="nebula-particle" style="--x:0.2; --y:-0.4; --delay:0.1s"></div>
        <div class="nebula-particle" style="--x:0.5; --y:-0.2; --delay:0.3s"></div>
        <div class="nebula-particle" style="--x:0.3; --y:0.3; --delay:0.5s"></div>
        <div class="nebula-particle" style="--x:0.7; --y:0.1; --delay:0.2s"></div>
        <div class="nebula-particle" style="--x:0.1; --y:-0.7; --delay:0.4s"></div>
        <div class="nebula-particle" style="--x:0.6; --y:0.4; --delay:0.6s"></div>
      </div>
      <div class="nebula-input">
        <input required="" type="password" name="text" autocomplete="off" class="input" />
        <label class="user-label">PASSWORD</label>
        <div class="nebula-particle" style="--x:0.2; --y:-0.4; --delay:0.1s"></div>
        <div class="nebula-particle" style="--x:0.5; --y:-0.2; --delay:0.3s"></div>
        <div class="nebula-particle" style="--x:0.3; --y:0.3; --delay:0.5s"></div>
        <div class="nebula-particle" style="--x:0.7; --y:0.1; --delay:0.2s"></div>
        <div class="nebula-particle" style="--x:0.1; --y:-0.7; --delay:0.4s"></div>
        <div class="nebula-particle" style="--x:0.6; --y:0.4; --delay:0.6s"></div>
      </div>
      <a target="_blank" href="https://profile.oracle.com/myprofile/account/forgot-password.jspx" class="div-a">FORGET PASSWORD ?</a>
      <a href="" class="div-a">
<button class="button">
  <span>Sign Up</span>
</button>
      </a>
    </div>
</body>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  AOS.init(
    {
      duration: 1700,
    }
  );
</script>

</html>
